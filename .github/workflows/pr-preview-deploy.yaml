name: Deploy Preview

on:
  workflow_run:
    workflows: ["Build & Deploy"]
    types:
      - completed

permissions:
  actions: read # needed for downloading artifacts from triggering workflow
  pull-requests: write # needed for commenting on PRs

jobs:
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download PR artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-preview
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read PR number
        id: pr
        run: |
          echo "number=$(cat pr/number)" >> "$GITHUB_OUTPUT"

      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.TENZIR_GITHUB_APP_ID }}
          private-key: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          repositories: docs-previews

      - name: Deploy PR Preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: tenzir/docs-previews
          folder: dist
          target-folder: ${{ steps.pr.outputs.number }}
          branch: gh-pages
          clean: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const url = 'https://preview.docs.tenzir.com/${{ steps.pr.outputs.number }}';
            const comment = [
              '<!-- docs-preview -->',
              `📦 **Preview** &nbsp;·&nbsp; [View →](${url}) &nbsp;·&nbsp; 🟢 Live`,
              '',
              '<sub>Auto-updates on push</sub>'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('<!-- docs-preview -->')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                body: comment
              });
            }
