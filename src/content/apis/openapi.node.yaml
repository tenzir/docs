---
openapi: 3.0.0
info:
  title: Tenzir REST API
  version: v0
  description: "Use the Tenzir REST API to manage pipelines and read pipeline output from a Tenzir node.\n\nAuthenticate every request with a token in the `X-Tenzir-Token` request header. Generate tokens with `tenzir-ctl web generate-token`.\n\nAll endpoints are versioned. Prefix every path in this specification with `/v0`."
  license:
    name: BSD-3-Clause
    url: https://github.com/tenzir/tenzir/blob/main/LICENSE
servers:
  - url: /api/v0
    description: Versioned API endpoint on the current Tenzir node.
tags:
  - name: Health
    description: Node health checks.
  - name: Pipelines
    description: Pipeline lifecycle management.
  - name: Pipeline output
    description: Read events produced by running pipelines.
security:
  - TenzirToken:
      []
components:
  schemas:
    Annotation:
      type: object
      properties:
        primary:
          type: boolean
        text:
          type: string
          example: this option does not exist
          description: A potentially empty label.
        source:
          $ref: "#/components/schemas/Location"
    CreateParameters:
      type: object
      required:
        - definition
      properties:
        id:
          type: string
          example: 08446737-da9b-4787-8599-97d85c48c3bb
          description: The pipeline ID. If omitted, Tenzir generates a random ID.
        definition:
          type: string
          example: export | where foo | publish /bar
          description: The pipeline definition.
        name:
          type: string
          description: The human-readable name of the pipeline.
          default: "[an auto-generated id]"
          example: zeek-monitoring-pipeline
        hidden:
          type: boolean
          description: "Whether this pipeline is hidden. Hidden pipelines start automatically,\nare not persisted, and are omitted from the `/pipeline/list` response.\n"
          default: false
          example: false
        ttl:
          type: string
          nullable: true
          description: "A duration string specifying the maximum time for this pipeline to\nexist. No value means the pipeline is allowed to exist forever.\nThis parameter must be defined if the `hidden` parameter is true.\n"
          default: null
          example: 5min
        autostart:
          $ref: "#/components/schemas/PipelineAutostart"
        autodelete:
          $ref: "#/components/schemas/PipelineAutodelete"
        retry_delay:
          type: string
          description: "A duration string specifying the minimum time between automatic restarts\nof a pipeline when an error occurs. Takes no effect if restarting on\nfailure is disabled.\n"
          default: 1min
          example: 500ms
        unstoppable:
          type: boolean
          description: "Whether this pipeline is unstoppable. Unstoppable pipelines start\nautomatically, fail when they complete, and can't be paused or stopped\nmanually.\n"
          default: false
          example: true
    Diagnostic:
      type: object
      properties:
        severity:
          type: string
          enum:
            - error
            - warning
            - note
        message:
          type: string
          example: unknown option `--frobnify`
        annotation:
          type: array
          items:
            $ref: "#/components/schemas/Annotation"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
        rendered:
          type: string
          example: "\x1b[1m\x1b[31merror\x1b[39m: unknown option `--frobnify`\x1b[0m\n"
    Diagnostics:
      type: array
      items:
        $ref: "#/components/schemas/Diagnostic"
    LaunchParameters:
      type: object
      required:
        - definition
      properties:
        id:
          type: string
          example: 08446737-da9b-4787-8599-97d85c48c3bb
          description: The pipeline ID. If omitted, Tenzir generates a random ID.
        definition:
          type: string
          example: export | where foo
          description: The pipeline definition.
        name:
          type: string
          description: The human-readable name of the pipeline.
          default: "[an auto-generated id]"
          example: interactive-query
        hidden:
          type: boolean
          description: Whether this pipeline is hidden.
          default: false
          example: true
        ttl:
          type: string
          nullable: true
          description: "A duration string specifying the maximum time for this pipeline to\nexist. No value means the pipeline is allowed to exist forever.\nThis parameter must be finite and defined if the `hidden` parameter is\ntrue.\n"
          default: null
          example: 5min
        autostart:
          $ref: "#/components/schemas/PipelineAutostart"
        autodelete:
          $ref: "#/components/schemas/PipelineAutodelete"
        retry_delay:
          type: string
          description: The minimum time between automatic restarts after a pipeline error.
          default: 1min
          example: 500ms
        unstoppable:
          type: boolean
          description: Whether this pipeline is unstoppable.
          default: false
          example: false
        cache_id:
          type: string
          description: "The identifier for the `cache` operator, which is inserted only\nwhen this parameter is provided.\n"
          example: 4ada2434-32asfe2s
        cache_capacity:
          type: integer
          minimum: 1
          description: The maximum number of events to keep in the `cache` operator.
          example: 4000
        cache_read_timeout:
          type: string
          description: "The time to live of the cache. Resets when reading from the cache.\n"
          example: 1min
        cache_write_timeout:
          type: string
          description: "The maximum time to live of the cache. Unlike the `cache_read_timeout`\nparameter, this does not reset when reading from the cache.\n"
          example: 1h
        serve_id:
          type: string
          description: The output stream identifier to create for reading events from this pipeline.
          example: 4ada2434-32asfe2s
        serve_buffer_size:
          type: integer
          minimum: 1
          description: The maximum number of events to buffer for the output stream.
          example: 4000
    LaunchResponseForPipelineWithExplicitSink:
      type: object
      properties:
        deployable:
          type: boolean
          description: Returns this property with the value `true`.
          example: true
    LaunchResponseForPipelineWithoutExplicitSink:
      type: object
      properties:
        id:
          type: string
          description: The ID of the created pipeline. Present when Tenzir added an implicit output stream because the pipeline does not end with a sink.
          example: 4c7f2b11-6169-4d1b-89b4-4fc0a68b3d4a
    Location:
      type: object
      description: A region in the source code, defined by byte offsets.
      properties:
        begin:
          type: number
          example: 42
        end:
          type: number
          example: 48
    Note:
      type: object
      properties:
        kind:
          type: string
          enum:
            - note
            - usage
            - hint
            - docs
          example: usage
        message:
          type: string
          example: file <path> [-f|--follow] [-m|--mmap] [-t|--timeout <duration>]
    PipelineAutodelete:
      type: object
      description: Flags that specify on which state to delete the pipeline.
      properties:
        completed:
          type: boolean
          description: Autodelete the pipeline upon completion.
          default: false
          example: false
        failed:
          type: boolean
          description: Autodelete the pipeline upon failure.
          default: false
          example: true
        stopped:
          type: boolean
          description: Autodelete the pipeline when it stops before completing.
          default: false
          example: false
    PipelineAutostart:
      type: object
      description: Flags that specify on which state to restart the pipeline.
      properties:
        created:
          type: boolean
          description: Autostart the pipeline upon creation.
          default: false
          example: true
        completed:
          type: boolean
          description: Autostart the pipeline upon completion.
          default: false
          example: false
        failed:
          type: boolean
          description: Autostart the pipeline upon failure.
          default: false
          example: false
    PipelineInfo:
      type: object
      properties:
        id:
          type: string
          description: The pipeline id.
        name:
          type: string
          description: The human-readable name of the pipeline.
        definition:
          type: string
          description: The pipeline definition.
        unstoppable:
          type: boolean
          description: "A flag specifying whether this pipeline is unstoppable.\nUnstoppable pipelines start automatically, fail when they complete, and can not be paused or stopped manually.\n"
          example: true
        hidden:
          type: boolean
          description: Whether this pipeline is hidden. Hidden pipelines are only available through the `show pipelines` operator.
        created_at:
          type: integer
          format: int64
          description: The Unix timestamp of the pipeline creation time in nanoseconds.
        last_modified:
          type: integer
          format: int64
          description: The Unix timestamp of the last pipeline modification in nanoseconds.
        start_time:
          type: string
          description: If the pipeline has been started, the ISO 8601 timestamp of the most recent start.
        total_runs:
          type: integer
          description: The total amount of runs this pipeline has attempted so far.
        state:
          type: string
          enum:
            - created
            - running
            - paused
            - failed
            - stopped
            - completed
        error:
          type: string
          nullable: true
          description: The error that the pipeline may have encountered during running.
        diagnostics:
          $ref: "#/components/schemas/Diagnostics"
        labels:
          $ref: "#/components/schemas/PipelineLabels"
        retry_delay:
          type: string
          description: "A duration string specifying the minimum time between automatic restarts\nof a pipeline when an error occurs. Takes no effect if restarting on\nfailure is disabled.\n"
          example: 10s
        autostart:
          $ref: "#/components/schemas/PipelineAutostart"
        autodelete:
          $ref: "#/components/schemas/PipelineAutodelete"
        ttl:
          type: string
          nullable: true
          description: If a TTL exists for this pipeline, the TTL as a duration string.
          example: 2min
        remaining_ttl:
          type: string
          nullable: true
          description: If a TTL exists for this pipeline, the remaining TTL as a duration string.
          example: 10s
    PipelineLabel:
      type: object
      properties:
        text:
          type: string
          description: The pipeline label text.
          example: zeek
        color:
          type: string
          description: The pipeline label color.
          example: 3F1A24
    PipelineLabels:
      type: array
      description: The user-provided labels for this pipeline.
      items:
        $ref: "#/components/schemas/PipelineLabel"
  securitySchemes:
    TenzirToken:
      type: apiKey
      in: header
      name: X-Tenzir-Token
paths:
  /ping:
    post:
      tags:
        - Health
      operationId: pingNode
      summary: Check node health
      description: Checks whether the node can respond to authenticated API requests. The response includes the node version.
      responses:
        200:
          description: The node is healthy.
          content:
            application/json:
              schema:
                type: object
                required:
                  - version
                properties:
                  version:
                    type: string
                    description: The version of the responding node.
                    example: v2.3.0-rc3-32-g8529a6c43f
              example:
                version: v2.3.0-rc3-32-g8529a6c43f
        401:
          description: The request is missing a valid authentication token.
  /pipeline/create:
    post:
      tags:
        - Pipelines
      operationId: createPipeline
      summary: Create a new pipeline
      description: "Creates a pipeline.\n\nIf `autostart.created` is `true`, Tenzir sends the response after the\npipeline starts successfully. If startup fails, Tenzir discards the\npipeline and returns the observed diagnostics.\n"
      requestBody:
        description: Pipeline creation request.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParameters"
            example:
              definition: export | where foo | publish /bar
              name: zeek-monitoring-pipeline
              hidden: false
      responses:
        200:
          description: The pipeline was created.
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    type: string
                    description: The id of the successfully created pipeline.
                    example: 4c7f2b11-6169-4d1b-89b4-4fc0a68b3d4a
        400:
          description: Invalid arguments or invalid pipeline.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Invalid arguments
                    description: The error message.
                  diagnostics:
                    $ref: "#/components/schemas/Diagnostics"
  /pipeline/delete:
    post:
      tags:
        - Pipelines
      operationId: deletePipeline
      summary: Delete an existing pipeline
      description: Deletes a pipeline by ID.
      requestBody:
        description: Body for the delete endpoint
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  example: 4c7f2b11-6169-4d1b-89b4-4fc0a68b3d4a
                  description: The id of the pipeline to be deleted.
      responses:
        200:
          description: The pipeline was deleted.
          content:
            application/json:
              schema:
                type: object
                example:
                  {}
        400:
          description: Invalid arguments.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Invalid arguments
                    description: The error message.
  /pipeline/launch:
    post:
      tags:
        - Pipelines
      operationId: launchPipeline
      summary: Launch a new pipeline
      description: "Creates a pipeline and prepares it for interactive use. If the pipeline\ndoes not end with a sink, Tenzir adds an implicit output stream and\nreturns the created pipeline ID. If the pipeline already has a sink,\nTenzir returns `deployable: true` so the caller can deploy it explicitly.\n"
      requestBody:
        description: Pipeline launch request.
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LaunchParameters"
            example:
              definition: export | where foo
              name: interactive-query
              serve_id: query-1
              serve_buffer_size: 4000
      responses:
        200:
          description: The launch request was accepted.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/LaunchResponseForPipelineWithExplicitSink"
                  - $ref: "#/components/schemas/LaunchResponseForPipelineWithoutExplicitSink"
        400:
          description: Invalid arguments or invalid pipeline.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Invalid arguments
                    description: The error message.
                  diagnostics:
                    $ref: "#/components/schemas/Diagnostics"
  /pipeline/list:
    post:
      tags:
        - Pipelines
      operationId: listPipelines
      summary: List pipelines
      description: Lists all visible pipelines.
      responses:
        200:
          description: The pipeline list.
          content:
            application/json:
              schema:
                type: object
                description: An array of all pipelines.
                properties:
                  pipelines:
                    type: array
                    items:
                      $ref: "#/components/schemas/PipelineInfo"
                example:
                  pipelines:
                    - id: 4c7f2b11-6169-4d1b-89b4-4fc0a68b3d4a
                      name: user-assigned-name
                      definition: export | where foo | publish /bar
                      hidden: false
                      created_at: 1706180157837037485
                      last_modified: 1706180157837038016
                      state: running
                      error: null
                      diagnostics:
                        []
                    - id: 08446737-da9b-4787-8599-97d85c48c3bb
                      name: wrong-pipeline
                      definition: export asdf
                      hidden: false
                      created_at: 1706180157837037485
                      last_modified: 1706180157837038016
                      state: failed
                      error: format 'asdf' not found
                      diagnostics:
                        []
        400:
          description: Invalid arguments.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Invalid arguments
                    description: The error message.
  /pipeline/reset-ttl:
    post:
      tags:
        - Pipelines
      operationId: resetPipelineTtl
      summary: Reset the TTL of an existing pipeline
      description: "Resets the TTL for existing pipelines that were created with a TTL.\nResetting the TTL restarts the TTL timer from zero seconds and keeps the\npipelines alive longer.\n"
      requestBody:
        description: Body for the reset-ttl endpoint
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  example:
                    - 4c7f2b11-6169-4d1b-89b4-4fc0a68b3d4a
                    - 08446737-da9b-4787-8599-97d85c48c3bb
                    - interactive-query
                  description: The id of pipelines whose TTL should be updated.
      responses:
        200:
          description: The TTL was reset for the returned pipeline IDs.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ids:
                    type: array
                    items:
                      type: string
                    example:
                      - 4c7f2b11-6169-4d1b-89b4-4fc0a68b3d4a
                      - interactive-query
                    description: The id of pipelines whose TTL has been successfully updated.
        400:
          description: Invalid arguments.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Invalid arguments
                    description: The error message.
  /pipeline/update:
    post:
      tags:
        - Pipelines
      operationId: updatePipeline
      summary: Update pipeline state
      description: "Updates the definition, metadata, or lifecycle state of a pipeline.\nTenzir leaves omitted fields unchanged.\n"
      requestBody:
        description: Body for the update endpoint
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: string
                  example: 08446737-da9b-4787-8599-97d85c48c3bb
                  description: The id of the pipeline to be updated.
                definition:
                  type: string
                  example: export | where baz | publish /foo
                  description: The updated definition of the pipeline.
                action:
                  type: string
                  enum:
                    - start
                    - pause
                    - stop
                  description: The action that will change the pipeline's running state.
                  example: start
                name:
                  type: string
                  description: Update the human-readable name of the pipeline to this value.
                  example: zeek-monitoring-pipeline
                labels:
                  $ref: "#/components/schemas/PipelineLabels"
                autostart:
                  $ref: "#/components/schemas/PipelineAutostart"
                autodelete:
                  $ref: "#/components/schemas/PipelineAutodelete"
                retry_delay:
                  type: string
                  description: "A duration string specifying the minimum time between automatic restarts\nof a pipeline when an error occurs. Takes no effect if restarting on\nfailure is disabled.\n"
                  example: 500ms
                unstoppable:
                  type: boolean
                  description: "A flag specifying whether this pipeline is unstoppable.\nUnstoppable pipelines start automatically, fail when they complete, and can not be paused or stopped manually.\n"
                  example: true
      responses:
        200:
          description: The pipeline was updated.
          content:
            application/json:
              schema:
                type: object
                description: The updated pipeline.
                properties:
                  pipeline:
                    $ref: "#/components/schemas/PipelineInfo"
        400:
          description: Invalid arguments.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Invalid arguments
                    description: The error message.
  /serve:
    post:
      tags:
        - Pipeline output
      operationId: readPipelineOutput
      summary: Read pipeline output
      description: "Reads events from an existing pipeline output stream. By default, the endpoint uses long polling (`timeout: 5s`) and returns as soon as at least one event is available (`min_events: 1`)."
      requestBody:
        description: Pipeline output request.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - serve_id
              properties:
                serve_id:
                  type: string
                  example: query-1
                  description: The output stream identifier returned when the pipeline was launched.
                continuation_token:
                  type: string
                  example: 340ce2j
                  description: The continuation token from the previous response. Omit this field for the initial request.
                max_events:
                  type: integer
                  minimum: 0
                  example: 1024
                  default: 1024
                  description: The maximum number of events to return.
                min_events:
                  type: integer
                  minimum: 0
                  example: 1
                  default: 1
                  description: The minimum number of events to wait for before returning.
                timeout:
                  type: string
                  example: 200ms
                  default: 5s
                  description: The maximum time to spend on the request. Reaching the timeout returns the available events and is not an error. The timeout must not be greater than 10 seconds.
                schema:
                  type: string
                  enum:
                    - legacy
                    - exact
                    - never
                  example: exact
                  default: legacy
                  description: The schema representation to include in the response. Use `exact` for a representation that matches Tenzir's type system exactly, and `never` to omit schema definitions.
            example:
              serve_id: query-1
              max_events: 1024
              min_events: 1
              timeout: 5s
              schema: exact
      responses:
        200:
          description: Events are available, the timeout was reached, or the pipeline reached a terminal state.
          content:
            application/json:
              schema:
                type: object
                required:
                  - next_continuation_token
                  - state
                  - events
                properties:
                  next_continuation_token:
                    type: string
                    nullable: true
                    description: The token to use when reading the next batch. The value is `null` when the pipeline reached a terminal state.
                    example: 340ce2j
                  state:
                    type: string
                    enum:
                      - running
                      - completed
                      - failed
                    description: The pipeline state at the time of the request.
                    example: running
                  schemas:
                    type: array
                    items:
                      type: object
                      properties:
                        schema_id:
                          type: string
                          description: The unique schema identifier.
                        definition:
                          description: The schema definition in JSON format.
                    description: The schemas for the returned events. This field is omitted when the request sets `schema` to `never`.
                    example:
                      - schema_id: c631d301e4b18f4
                        definition:
                          - name: tenzir.summarize
                            kind: record
                            type: tenzir.summarize
                            attributes:
                              {}
                            path:
                              []
                            fields:
                              - name: severity
                                kind: string
                                type: string
                                attributes:
                                  {}
                                path:
                                  - 0
                                fields:
                                  []
                              - name: pipeline_id
                                kind: string
                                type: string
                                attributes:
                                  {}
                                path:
                                  - 1
                                fields:
                                  []
                  events:
                    type: array
                    items:
                      type: object
                      properties:
                        schema_id:
                          type: string
                          description: The unique schema identifier.
                        data:
                          type: object
                          description: The event data in JSON format.
                    description: The returned events.
                    example:
                      - schema_id: c631d301e4b18f4
                        data:
                          timestamp: 2023-04-26T12:00:00Z
                          schema: zeek.conn
                          schema_id: ab2371bas235f1
                          events: 50
                      - schema_id: c631d301e4b18f4
                        data:
                          timestamp: 2023-04-26T12:05:00Z
                          schema: suricata.dns
                          schema_id: cd4771bas235f1
                          events: 50
              example:
                next_continuation_token: 340ce2j
                state: running
                schemas:
                  - schema_id: c631d301e4b18f4
                    definition:
                      name: tenzir.summarize
                      kind: record
                      type: tenzir.summarize
                      attributes:
                        {}
                      path:
                        []
                      fields:
                        []
                events:
                  - schema_id: c631d301e4b18f4
                    data:
                      timestamp: 2023-04-26T12:00:00Z
                      schema: zeek.conn
                      events: 50
        400:
          description: The request body is invalid.
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string
                    example: Invalid arguments
                    description: The error message.
  /serve-multi:
    post:
      tags:
        - Pipeline output
      operationId: readMultiplePipelineOutputs
      summary: Read multiple pipeline outputs
      description: "Reads events from multiple existing pipeline output streams. By default, the endpoint uses long polling (`timeout: 5s`) and returns as soon as at least one event is available (`min_events: 1`)."
      requestBody:
        description: Pipeline output batch request.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requests
              properties:
                requests:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required:
                      - serve_id
                    properties:
                      serve_id:
                        type: string
                        example: query-1
                        description: The output stream identifier returned when the pipeline was launched.
                      continuation_token:
                        type: string
                        example: 340ce2j
                        description: The continuation token from the previous response for this output stream. Omit this field for the initial request.
                max_events:
                  type: integer
                  minimum: 0
                  example: 1024
                  default: 1024
                  description: The maximum number of events to return across all requested output streams. The limit is split evenly across streams and rounded up when necessary.
                min_events:
                  type: integer
                  minimum: 0
                  example: 1
                  default: 1
                  description: The minimum number of events to wait for across all requested output streams before returning. The limit is split evenly across streams and rounded up when necessary.
                timeout:
                  type: string
                  example: 200ms
                  default: 5s
