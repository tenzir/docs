<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">CrowdStrike integration</title>
  <desc id="desc">Tenzir sends events to Falcon Next-Gen SIEM over HTTPS and reads Falcon Data Replicator events from SQS notifications and S3 objects.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#246bfe" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#17805c" />
    </marker>
    <style>
      text {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .label {
        fill: #1d2433;
        font-size: 17px;
        font-weight: 650;
      }
      .small {
        fill: #475569;
        font-size: 13px;
      }
      .box {
        fill: #ffffff;
        stroke: #cbd5e1;
        stroke-width: 2;
        rx: 8;
      }
      .tenzir {
        fill: #eff6ff;
        stroke: #246bfe;
      }
      .crowdstrike {
        fill: #fff1f2;
        stroke: #c0263d;
      }
      .aws {
        fill: #ecfdf5;
        stroke: #17805c;
      }
      .caption {
        fill: #334155;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </defs>
  <rect x="1" y="1" width="978" height="418" rx="14" fill="#f8fafc" stroke="#e2e8f0" />
  <text x="490" y="42" text-anchor="middle" class="label">Bidirectional CrowdStrike data flow</text>

  <rect x="60" y="92" width="210" height="88" class="box tenzir" />
  <text x="165" y="128" text-anchor="middle" class="label">Tenzir</text>
  <text x="165" y="154" text-anchor="middle" class="small">filter, shape, route</text>

  <rect x="710" y="92" width="210" height="88" class="box crowdstrike" />
  <text x="815" y="124" text-anchor="middle" class="label">Falcon Next-Gen SIEM</text>
  <text x="815" y="151" text-anchor="middle" class="small">HEC/HTTP connector</text>

  <path d="M 278 136 H 700" fill="none" stroke="#246bfe" stroke-width="3" marker-end="url(#arrow-blue)" />
  <text x="489" y="118" text-anchor="middle" class="caption">to_http over HTTPS</text>
  <text x="489" y="157" text-anchor="middle" class="small">JSON with _raw or raw NDJSON</text>

  <rect x="60" y="252" width="210" height="88" class="box crowdstrike" />
  <text x="165" y="285" text-anchor="middle" class="label">Falcon FDR</text>
  <text x="165" y="312" text-anchor="middle" class="small">S3 objects and SQS notices</text>

  <rect x="374" y="252" width="112" height="88" class="box aws" />
  <text x="430" y="288" text-anchor="middle" class="label">SQS</text>
  <text x="430" y="314" text-anchor="middle" class="small">notify</text>

  <rect x="548" y="252" width="112" height="88" class="box aws" />
  <text x="604" y="288" text-anchor="middle" class="label">S3</text>
  <text x="604" y="314" text-anchor="middle" class="small">gzip NDJSON</text>

  <rect x="710" y="252" width="210" height="88" class="box tenzir" />
  <text x="815" y="285" text-anchor="middle" class="label">Tenzir</text>
  <text x="815" y="312" text-anchor="middle" class="small">from_sqs, from_s3</text>

  <path d="M 278 296 H 364" fill="none" stroke="#17805c" stroke-width="3" marker-end="url(#arrow-green)" />
  <path d="M 496 296 H 538" fill="none" stroke="#17805c" stroke-width="3" marker-end="url(#arrow-green)" />
  <path d="M 670 296 H 700" fill="none" stroke="#17805c" stroke-width="3" marker-end="url(#arrow-green)" />
  <text x="489" y="375" text-anchor="middle" class="caption">FDR source path: keep messages for replay or dedicate a queue to Tenzir</text>
</svg>
